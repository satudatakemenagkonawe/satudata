<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulir Kontak Modern</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">

    <div class="bg-white p-8 rounded-lg shadow-lg w-full max-w-md">
        <h2 class="text-2xl font-bold mb-6 text-gray-800 text-center">Hubungi Kami</h2>
        
        <form id="contactForm" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700">Nama Lengkap</label>
                <input type="text" id="nama" name="nama" required
                    class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700">Nomor WhatsApp</label>
                <input type="tel" id="whatsapp" name="whatsapp" placeholder="Contoh: 628123456789" required
                    class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500">
                <p class="text-xs text-gray-500 mt-1">*Gunakan kode negara (62)</p>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700">Pesan</label>
                <textarea id="pesan" name="pesan" rows="4" required
                    class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500"></textarea>
            </div>

            <button type="submit" id="submitBtn"
                class="w-full bg-blue-600 text-white py-2 px-4 rounded-md hover:bg-blue-700 transition duration-300 font-semibold">
                Kirim Data
            </button>
        </form>

        <div id="responseMsg" class="mt-4 text-center hidden">
            <p class="text-green-600 font-medium">Berhasil! Data terkirim dan pesan WA sedang diproses.</p>
        </div>
    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbz6j6j3kT6N1Y3jqB659lH90RhRxTynKplXrX64kZCFmwv_YJDu7hWgp8rKhKNI6EnSzQ/exec'; // Tempel URL dari Langkah 1
        const form = document.getElementById('contactForm');
        const btn = document.getElementById('submitBtn');
        const msg = document.getElementById('responseMsg');

        form.addEventListener('submit', e => {
            e.preventDefault();
            btn.disabled = true;
            btn.innerText = 'Mengirim...';

            const formData = {
                nama: document.getElementById('nama').value,
                whatsapp: document.getElementById('whatsapp').value,
                pesan: document.getElementById('pesan').value
            };

            fetch(scriptURL, {
                method: 'POST',
                body: JSON.stringify(formData)
            })
            .then(response => {
                btn.innerText = 'Kirim Data';
                btn.disabled = false;
                form.reset();
                msg.classList.remove('hidden');
                setTimeout(() => msg.classList.add('hidden'), 5000);
            })
            .catch(error => {
                console.error('Error!', error.message);
                alert('Terjadi kesalahan saat mengirim data.');
                btn.disabled = false;
            });
        });
    </script>
</body>
</html>
